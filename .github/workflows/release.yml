name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
        
    - name: Validate SKILL.md
      run: |
        python << 'EOF'
        import yaml
        import re
        
        with open('SKILL.md', 'r', encoding='utf-8') as f:
            content = f.read()
        
        # 提取 frontmatter
        match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
        if not match:
            print("❌ 错误: 未找到 YAML frontmatter")
            exit(1)
        
        try:
            frontmatter = yaml.safe_load(match.group(1))
            if 'name' not in frontmatter or 'description' not in frontmatter:
                print("❌ 错误: frontmatter 缺少必要字段 (name, description)")
                exit(1)
            print(f"✅ 验证通过: {frontmatter['name']}")
        except yaml.YAMLError as e:
            print(f"❌ 错误: YAML 解析失败 - {e}")
            exit(1)
        EOF
        
    - name: Package skill
      run: |
        # 创建发布目录
        mkdir -p release
        
        # 复制必要文件
        cp SKILL.md release/
        cp -r assets release/
        
        # 创建 .skill 文件 (zip 格式)
        cd release
        zip -r ../astock-morning-dao.skill .
        cd ..
        
        # 计算校验和
        sha256sum astock-morning-dao.skill > checksum.txt
        
    - name: Generate release notes
      run: |
        cat > RELEASE_NOTES.md << 'EOF'
        ## Astock Morning DAO 发布
        
        ### 安装方法
        
        1. 下载 `astock-morning-dao.skill` 文件
        2. 将技能文件导入到你的 AI 助手系统中
        3. 开始使用：`生成今天的全维度早盘报告`
        
        ### 文件说明
        
        - `astock-morning-dao.skill` - 技能主文件
        - `checksum.txt` - SHA256 校验和
        
        ### 快速开始
        
        ```
        生成今天的全维度早盘报告
        制作 2025-05-26 的综合分析报告
        查看今日 A 股操作指导
        ```
        
        ### 文档
        
        - [README.md](README.md) - 项目说明
        - [docs/](docs/) - 研究文档
        
        ---
        
        **⚠️ 免责声明**：本项目仅供学习研究交流，不构成任何投资建议。
        EOF
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          astock-morning-dao.skill
          checksum.txt
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update version badge
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "Released version: $VERSION"
